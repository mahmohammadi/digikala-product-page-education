<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digikala Product Page - Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-[#f3f3f3] text-[#222]">
    <header>
      <div class="flex h-[60px] items-center justify-center bg-gradient-to-r from-[#0f3b2f] to-[#1d5c4c]">
        <div class="flex items-center gap-4 text-sm font-bold text-white">
          <span>مدل؟ اندازه؟ برند؟ یخچال مناسب خونه ات رو راحت پیدا کن</span>
          <span></span>
        </div>
      </div>

      <div class="border-b border-[#e5e5e5] bg-white">
        <div class="mx-auto flex min-h-[76px] w-[min(100%-32px,1600px)] items-center justify-between gap-6">
          <div class="flex items-center gap-6">
            <a href="#" class="whitespace-nowrap text-[42px] font-bold text-[#e6123d]">
              دیجی‌کالا
            </a>

            <div class="w-[600px] max-w-full">
              <input
                type="text"
                placeholder="🔍 جستجو"
                class="h-11 w-full rounded-lg border border-[#eeeeee] bg-[#f0f0f1] px-4 text-[#666] outline-none"
              />
            </div>
          </div>

          <div class="flex items-center gap-3">
            <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-[#e0e0e2] bg-white">
              🛒
            </button>

            <button type="button" class="inline-flex h-10 items-center justify-center whitespace-nowrap rounded-lg border border-[#e0e0e2] bg-white px-4 font-bold">
              ورود | ثبت‌نام
            </button>

            <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-[#e0e0e2] bg-white">
              🔔
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
